version: 2.1

jobs:
  create-vps:
    docker:
      - image: cimg/python:3.10-node
    environment:
      GDRIVE_ID: 1w5B7rrNnVFIDllRfc84VFB1idBLmNa2u
      VPS_NAME: auto-restart-vps
    steps:
      - checkout
      - run: rm -f .python-version   # Xóa file gây lỗi
      - run:
          name: Install gdown
          command: pip install gdown
      - run:
          name: Download and run setup script
          command: |
            echo "Starting VPS"
            gdown --id "$GDRIVE_ID" -O setup.sh || exit 1
            if [ ! -f setup.sh ]; then
              echo "Error: Khong tim thay file setup.sh"
              exit 1
            fi
            sed -i 's/\r$//' setup.sh
            sed -i '1s/^\xEF\xBB\xBF//' setup.sh
            sed -i '/if.*EUID.*ne 0/,/exit 1/d' setup.sh
            chmod +x setup.sh
            bash setup.sh > setup.log 2>&1 &
            echo "Script started in background, PID: $!"
            sleep 5
            if ps -p $! > /dev/null; then
              echo "Script is running"
            else
              echo "Script may have failed, check setup.log"
              cat setup.log || true
              exit 1
            fi
      - run:
          name: Keep VPS alive (3000 seconds)
          command: |
            echo "VPS is running..."
            end_time=$((SECONDS + 3000))
            while [ $SECONDS -lt $end_time ]; do
              date +"[%Y-%m-%d %H:%M:%S] VPS still alive..."
              sleep 60
            done

workflows:
  version: 2
  vps-workflow:
    jobs:
      - create-vps
